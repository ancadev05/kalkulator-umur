<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hitung Usia</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h3>Masukkan Tanggal Lahir Anda</h3>
      <div>
          <label for="tgl" class="form-label">Tanggal</label>
          <input
            type="date"
            class="form-control"
            name="tgl"
            id="tgl"
          />
          <small id="warning"></small>
          <button type="button" onclick="hitung()">Hitung</button>
      </div>

      <p>Usia Anda Saat ini:</p>
      <ul>
        <li id="tahun"></li>
        <li id="bulan"></li>
        <li id="hari"></li>
      </ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
